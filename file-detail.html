<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">File Detail · GitHub Clone</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-canvas-default: #0d1117;
            --color-canvas-subtle: #161b22;
            --color-border-default: #30363d;
            --color-fg-default: #adbac7;
            --color-fg-muted: #768390;
            --color-accent-fg: #58a6ff;
        }
        body {
            background-color: var(--color-canvas-default);
            color: var(--color-fg-default);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        .container {
            max-width: 1216px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        /* Navbar */
        .navbar {
            background-color: #010409;
            padding: 12px 0;
            border-bottom: 1px solid var(--color-border-default);
        }

        /* Repo Header */
        .repo-header-full {
            padding: 16px 0;
            background-color: var(--color-canvas-subtle);
            border-bottom: 1px solid var(--color-border-default);
            margin-bottom: 24px;
        }
        .repo-title {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .repo-title a {
            color: var(--color-accent-fg);
            text-decoration: none;
        }
        .repo-title a:hover { text-decoration: underline; }
        .repo-current { font-weight: 600; color: var(--color-fg-default); }

        /* Commit Bar */
        .commit-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--color-canvas-subtle);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }
        .commit-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .commit-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
        .commit-author { font-weight: 600; color: var(--color-fg-default); }
        .commit-message { color: var(--color-fg-default); }
        .commit-date { color: var(--color-fg-muted); font-size: 12px; }

        /* Code Box */
        .code-box {
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 32px;
        }
        .code-box-header {
            background-color: var(--color-canvas-subtle);
            border-bottom: 1px solid var(--color-border-default);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-meta {
            font-size: 12px;
            color: var(--color-fg-muted);
        }
        .code-content {
            display: flex;
            background-color: #0d1117;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 12px;
            line-height: 20px;
            overflow-x: auto;
        }
        .line-numbers {
            color: #484f58;
            text-align: right;
            padding: 16px 8px 16px 16px;
            min-width: 32px;
            user-select: none;
            border-right: 1px solid var(--color-border-default);
        }
        .code-lines {
            padding: 16px;
            white-space: pre;
            color: #adbac7;
            flex-grow: 1;
        }
        .keyword { color: #ff7b72; }
        .function { color: #d2a8ff; }
        .string { color: #a5d6ff; }
        .comment { color: #8b949e; }
        .number { color: #79c0ff; }

        .btn-group { display: flex; }
        .btn-sm {
            padding: 3px 12px;
            font-size: 12px;
            font-weight: 500;
            line-height: 20px;
            color: var(--color-fg-default);
            background-color: #21262d;
            border: 1px solid var(--color-border-default);
            cursor: pointer;
        }
        .btn-sm:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
        .btn-sm:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
        .btn-sm:hover { background-color: #30363d; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html">
                <svg height="32" viewBox="0 0 16 16" width="32" style="color: white;"><path fill="currentColor" d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
            </a>
        </div>
    </nav>

    <div class="repo-header-full">
        <div class="container">
            <div class="repo-title">
                <svg height="16" viewBox="0 0 16 16" width="16" class="octicon"><path fill="currentColor" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 1 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7l.01.01a.75.75 0 1 1-1.072 1.043 2.474 2.474 0 0 1-.474-1.253V2.5Z"></path></svg>
                <a href="index.html">ayushpal247</a> / <a href="repo-100-days-dsa.html">100-days-dsa</a> / <span id="file-name-breadcrumb" class="repo-current">...</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="commit-bar">
            <div class="commit-info">
                <img src="https://github.com/identicons/ayushpal247.png" class="commit-avatar">
                <span class="commit-author">ayushpal247</span>
                <span class="commit-message">Initial commit</span>
            </div>
            <div class="commit-date">1 week ago</div>
        </div>

        <div class="code-box">
            <div class="code-box-header">
                <div class="file-meta" id="file-info">...</div>
                <div class="btn-group">
                    <button class="btn-sm">Raw</button>
                    <button class="btn-sm">Blame</button>
                    <button class="btn-sm">Copy</button>
                </div>
            </div>
            <div class="code-content">
                <div class="line-numbers" id="line-numbers"></div>
                <div class="code-lines" id="code-text"></div>
            </div>
        </div>
    </div>

    <script src="./solutions.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const day = urlParams.get('day') || '01';
        
        const solution = solutions[day] || { 
            name: `Day_${day}_Problem.py`, 
            code: "# No solution found for this day." 
        };

        document.getElementById('page-title').textContent = `${solution.name} · ayushpal247/100-days-dsa`;
        document.getElementById('file-name-breadcrumb').innerText = solution.name;
        
        const lines = solution.code.split('\n').length;
        const lineNumbers = document.getElementById('line-numbers');
        lineNumbers.innerHTML = "";
        for (let i = 1; i <= lines; i++) {
            lineNumbers.innerHTML += i + '<br>';
        }

        document.getElementById('file-info').textContent = `${lines} lines | ${(solution.code.length / 1024).toFixed(2)} KB`;

        function highlightCode(code) {
            let escaped = code
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");

            // Multi-line comments
            escaped = escaped.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="comment">$1</span>');
            
            // Single-line comments
            escaped = escaped.replace(/(\/\/.+)/g, '<span class="comment">$1</span>');

            return escaped
                .replace(/\b(int|char|float|double|void|struct|enum|long|short|unsigned|signed|const|static|extern|bool)\b/g, '<span class="keyword" style="color: #ff7b72;">$1</span>')
                .replace(/\b(if|else|switch|case|default|while|for|do|break|continue|return|sizeof|goto|typedef)\b/g, '<span class="keyword" style="color: #ff7b72;">$1</span>')
                .replace(/#\b(include|define|if|else|endif|ifdef|ifndef)\b/g, '<span class="keyword" style="color: #ff7b72;">#$1</span>')
                .replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)(?=\()/g, '<span class="function" style="color: #d2a8ff;">$1</span>')
                .replace(/(["'])(.*?)\1/g, '<span class="string" style="color: #a5d6ff;">$1$2$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="number" style="color: #79c0ff;">$1</span>');
        }

        const codeText = document.getElementById('code-text');
        codeText.innerHTML = highlightCode(solution.code);
    </script>
</body>
</html>
