                        "Lowest Common Ancestor of a Binary Tree", "Time Based Key-Value Store", "Accounts Merge",
                        "Sort Colors", "Word Break", "Partition Equal Subset Sum", "String to Integer (atoi)",
                        "Spiral Matrix", "Subsets", "Binary Tree Right Side View", "Longest Palindromic Substring",
                        "Unique Paths", "Construct Binary Tree from Preorder and Inorder Traversal", "Container With Most Water",
                        "Letter Combinations of a Phone Number", "Word Search", "Find All Anagrams in a String",
                        "Minimum Window Substring", "Serialize and Deserialize Binary Tree", "Trapping Rain Water",
                        "Find Median from Data Stream", "Word Ladder", "Basic Calculator", "Maximum Profit in Job Scheduling",
                        "Merge k Sorted Lists", "Largest Rectangle in Histogram", "Binary Tree Maximum Path Sum",
                        "Regular Expression Matching", "Longest Valid Parentheses", "Edit Distance", "Minimum Path Sum",
                        "Search a 2D Matrix", "Pow(x, n)", "Group Anagrams", "N-Queens",
                        "Maximum Subarray", "Jump Game", "Unique Paths II", "Decode Ways",
                        "Subsets II", "Word Search II", "Reverse Nodes in k-Group", "Wildcard Matching",
                        "First Missing Positive", "Sudoku Solver", "Longest Consecutive Sequence", "Gas Station",
                        "Candy", "Word Break II", "Max Points on a Line", "LRU Cache",
                        "Largest Number", "House Robber", "Isomorphic Strings", "Kth Largest Element in an Array"
                    ];

                    const fileList = document.getElementById('file-list');
                    const now = new Date();
                    
                    for (let i = 0; i < 100; i++) {
                        const dayNum = (i + 1).toString().padStart(2, '0');
                        const problemName = problems[i] || `DSA Problem ${dayNum}`;
                        
                        let dateString;
                        if (i >= 90) {
                            dateString = "Today";
                        } else {
                            const daysAgo = 90 - i;
                            if (daysAgo < 7) {
                                dateString = daysAgo === 1 ? "Yesterday" : `${daysAgo} days ago`;
                            } else {
                                const commitDate = new Date(now);
                                commitDate.setDate(now.getDate() - daysAgo);
                                dateString = commitDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                            }
                        }

                        const row = document.createElement('div');
                        row.className = 'file-row';
                        row.style.cursor = 'pointer';
                        row.onclick = () => window.location.href = `file-detail.html?day=${dayNum}`;
                        row.innerHTML = `
                            <div class="file-name">

                        `;
